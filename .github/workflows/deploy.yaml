name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Package deploy bundle
        run: |
          mkdir -p .deploy
          cp out/server.js out/audit.worker.js out/content.worker.js .deploy/
          cp -r drizzle/ .deploy/drizzle/
          cp drizzle.config.ts .deploy/
          tar czf deploy.tar.gz -C .deploy .

      - name: Upload via SFTP
        run: |
          sshpass -p "${{ secrets.DEPLOY_PASSWORD }}" sftp -P ${{ secrets.DEPLOY_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} <<SFTP
          put deploy.tar.gz ${{ secrets.DEPLOY_PATH }}/deploy.tar.gz
          SFTP

      - name: Extract, migrate, and reload
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            tar xzf deploy.tar.gz
            rm deploy.tar.gz
            bunx drizzle-kit migrate
            pm2 reload api-server
            pm2 reload audit-worker
            pm2 reload content-worker
