name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Open SSH tunnel
        run: |
          sshpass -p "${{ secrets.DEPLOY_PASSWORD }}" ssh -f -N \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.DEPLOY_PORT }} \
            -L 3306:${{ secrets.MYSQL_HOST }}:${{ secrets.MYSQL_PORT }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}

      - name: Run migrations
        run: bun run db:migrate
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}

      - name: Close SSH tunnel
        if: always()
        run: pkill -f "ssh -f -N" || true

      - name: Upload via SFTP
        run: |
          sshpass -p "${{ secrets.DEPLOY_PASSWORD }}" sftp -P ${{ secrets.DEPLOY_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} <<SFTP
          put out/server.js ${{ secrets.DEPLOY_PATH }}/server.js
          put out/audit.worker.js ${{ secrets.DEPLOY_PATH }}/audit.worker.js
          put out/content.worker.js ${{ secrets.DEPLOY_PATH }}/content.worker.js
          SFTP

      - name: Reload PM2 processes
        run: |
          sshpass -p "${{ secrets.DEPLOY_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.DEPLOY_PORT }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && pm2 reload ecosystem.config.cjs"
